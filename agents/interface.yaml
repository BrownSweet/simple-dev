interface:
  display_name: "Simple Dev"
  short_description: "Minimal, verified changes without over-abstraction"
  default_prompt: "Use $simple-dev for the smallest correct change: follow project patterns, verify before and after, and check N+1 risks."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
    - "vscode"
  activation:
    mode: "implicit"
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "remote"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
    vscode: "agent-skills-source-with-vscode-notes"
